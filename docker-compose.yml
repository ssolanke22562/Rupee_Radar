version: "3.9"

name: rupeeradar

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: rupeeradar-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./rupee_radar.db
      - SESSION_TTL_HOURS=24
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.1-8b-instant}
      - CORS_ORIGINS=http://localhost:5173,http://localhost:4173
    volumes:
      - ./backend:/app
      - sqlite_data:/app/rupee_radar.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: rupeeradar-frontend
    ports:
      - "5173:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  sqlite_data: